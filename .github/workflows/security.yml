name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays at 06:00 UTC — catch new CVEs in transitive deps.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: python -m pip install --upgrade pip bandit

      - name: Run Bandit
        run: bandit -r src/mcp_gmail_manager -f txt -ll

  ruff:
    name: Ruff (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run Ruff check
        run: ruff check src/mcp_gmail_manager

  pip-audit:
    name: pip-audit (deps CVE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install pip-audit and package
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip install .

      # Reports CVEs in the resolved dependency tree. We do NOT gate the build
      # on this — transitive deps of upstream libraries move faster than we
      # can pin, and forcing green here would tempt us to skip real signal.
      # Read the run summary each PR/release.
      - name: Run pip-audit (informational)
        continue-on-error: true
        run: pip-audit
